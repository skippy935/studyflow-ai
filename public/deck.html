<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deck — StudyFlow AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-slate-100 sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/dashboard.html" class="text-slate-400 hover:text-slate-600 transition-colors">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
        </a>
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 bg-indigo-600 rounded-md flex items-center justify-center">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <span class="font-bold text-slate-900 text-sm">StudyFlow AI</span>
        </div>
      </div>
      <button id="logoutBtn" class="text-sm text-slate-400 hover:text-slate-600 transition-colors">Sign out</button>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-10">

    <!-- Deck header -->
    <div class="bg-white rounded-2xl p-8 border border-slate-100 shadow-sm mb-6">
      <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
        <div class="flex items-start gap-4">
          <div id="deckColorDot" class="w-12 h-12 rounded-xl shrink-0 flex items-center justify-center text-white font-bold text-xl"></div>
          <div>
            <h1 id="deckTitle" class="text-2xl font-bold text-slate-900"></h1>
            <p id="deckDesc" class="text-slate-500 text-sm mt-0.5"></p>
          </div>
        </div>
        <a id="studyBtn" href="#"
           class="inline-flex items-center gap-2 bg-indigo-600 text-white font-semibold px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition-colors text-sm shrink-0 shadow-sm shadow-indigo-200">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Study Now
        </a>
      </div>
      <div class="flex items-center gap-6 mt-6 pt-6 border-t border-slate-100">
        <div class="text-center">
          <div class="text-2xl font-bold text-slate-900" id="cardTotal">—</div>
          <div class="text-xs text-slate-400 mt-0.5">Total cards</div>
        </div>
        <div class="text-center">
          <div class="text-2xl font-bold text-indigo-600" id="dueCount">—</div>
          <div class="text-xs text-slate-400 mt-0.5">Due today</div>
        </div>
      </div>
    </div>

    <!-- Cards section -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
        <h2 class="font-semibold text-slate-900">All Cards</h2>
        <button id="addCardBtn"
          class="inline-flex items-center gap-1.5 text-sm font-medium text-indigo-600 hover:text-indigo-700 px-3 py-1.5 rounded-lg hover:bg-indigo-50 transition-colors">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          Add Card
        </button>
      </div>

      <!-- Column headers -->
      <div class="grid grid-cols-2 gap-4 px-6 py-2.5 bg-slate-50 border-b border-slate-100">
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Front</div>
        <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Back</div>
      </div>

      <!-- No cards -->
      <div id="noCards" style="display:none" class="text-center py-16 text-slate-400">
        <p class="mb-3">No cards yet.</p>
        <p class="text-sm">Click "Add Card" to create your first card manually.</p>
      </div>

      <!-- Card list -->
      <div id="cardsList"></div>
    </div>

    <p id="errorMsg" class="text-red-500 text-sm mt-4 min-h-[20px]"></p>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/deck.js"></script>
</body>
</html>
