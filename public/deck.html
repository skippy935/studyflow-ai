<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deck — StudyBuild</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

  <nav class="sb-nav">
    <div class="sb-nav-inner">
      <div style="display:flex;align-items:center;gap:.75rem;">
        <a href="/dashboard.html" style="color:var(--text-2);display:flex;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg></a>
        <a href="/dashboard.html" class="sb-logo">
          <div class="sb-logo-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
          StudyBuild
        </a>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <button class="theme-toggle" onclick="toggleTheme()"></button>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
      </div>
    </div>
  </nav>

  <main style="max-width:1000px;margin:0 auto;padding:2.5rem 1.5rem;">

    <!-- Deck header -->
    <div class="sb-card" style="padding:2rem;margin-bottom:1.5rem;">
      <div style="display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:1rem;">
        <div style="display:flex;align-items:flex-start;gap:1rem;">
          <div id="deckColorDot" style="width:48px;height:48px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:1.25rem;"></div>
          <div>
            <h1 id="deckTitle" style="font-size:1.5rem;font-weight:800;color:var(--text);margin:0 0 .25rem;"></h1>
            <p id="deckDesc" style="color:var(--text-2);font-size:.875rem;margin:0;"></p>
          </div>
        </div>
        <a id="studyBtn" href="#" class="btn btn-primary btn-sm">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Study Now
        </a>
      </div>
      <div style="display:flex;gap:2rem;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);">
        <div>
          <div style="font-size:1.75rem;font-weight:800;color:var(--text);" id="cardTotal">—</div>
          <div style="font-size:.75rem;color:var(--text-3);margin-top:.125rem;">Total cards</div>
        </div>
        <div>
          <div style="font-size:1.75rem;font-weight:800;color:var(--primary);" id="dueCount">—</div>
          <div style="font-size:.75rem;color:var(--text-3);margin-top:.125rem;">Due today</div>
        </div>
      </div>
    </div>

    <!-- Cards section -->
    <div class="sb-card" style="overflow:hidden;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);">
        <h2 style="font-weight:700;color:var(--text);font-size:.9375rem;margin:0;">All Cards</h2>
        <button id="addCardBtn" class="btn btn-ghost btn-sm">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Add Card
        </button>
      </div>

      <!-- Column headers -->
      <div style="display:grid;grid-template-columns:1fr 1fr 80px 80px;gap:1rem;padding:.625rem 1.5rem;background:var(--surface2);border-bottom:1px solid var(--border);">
        <div style="font-size:.65rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;">Front</div>
        <div style="font-size:.65rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;">Back</div>
        <div style="font-size:.65rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;">Level</div>
        <div></div>
      </div>

      <!-- No cards -->
      <div id="noCards" style="display:none;text-align:center;padding:4rem 1.5rem;color:var(--text-3);">
        <p style="margin:0 0 .5rem;">No cards yet.</p>
        <p style="font-size:.875rem;margin:0;">Click "Add Card" to create your first card manually.</p>
      </div>

      <!-- Card list -->
      <div id="cardsList"></div>
    </div>

    <p id="errorMsg" style="color:#EF4444;font-size:.875rem;margin-top:1rem;min-height:20px;"></p>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/deck.js"></script>
</body>
</html>
