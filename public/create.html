<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Deck — StudyFlow AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-slate-100 sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/dashboard.html" class="text-slate-400 hover:text-slate-600 transition-colors">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
        </a>
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 bg-indigo-600 rounded-md flex items-center justify-center">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <span class="font-bold text-slate-900 text-sm">StudyFlow AI</span>
        </div>
      </div>
      <button id="logoutBtn" class="text-sm text-slate-400 hover:text-slate-600 transition-colors">Sign out</button>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-6 py-10">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-900 mb-1">Create a New Deck</h1>
      <p class="text-slate-500 text-sm">Paste your notes below — AI will generate flashcards automatically.</p>
    </div>

    <form id="createForm" novalidate class="space-y-6">

      <!-- Deck name -->
      <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
        <h2 class="font-semibold text-slate-900 mb-4">Deck Details</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Deck Name <span class="text-red-400">*</span></label>
            <input id="deckName" type="text" placeholder="e.g. Chapter 4 — Cell Biology" maxlength="100"
              class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition-shadow">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Description <span class="text-slate-400 font-normal">(optional)</span></label>
            <input id="deckDesc" type="text" placeholder="A short description of this deck" maxlength="200"
              class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition-shadow">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Deck Colour</label>
            <div id="colorPicker" class="flex items-center gap-2.5 flex-wrap"></div>
          </div>
        </div>
      </div>

      <!-- Notes -->
      <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
        <h2 class="font-semibold text-slate-900 mb-1">Your Notes</h2>
        <p class="text-xs text-slate-400 mb-4">Paste lecture notes, a textbook excerpt, or any study material.</p>
        <textarea id="notes" class="notes-area w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition-shadow"
          placeholder="Paste your notes here…&#10;&#10;Example: The mitochondria is the powerhouse of the cell. It produces ATP through oxidative phosphorylation. The inner membrane contains cristae which increase the surface area for ATP synthase..." rows="10"></textarea>
      </div>

      <p id="errorMsg" class="text-red-500 text-sm min-h-[20px]"></p>

      <button id="generateBtn" type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl transition-colors flex items-center justify-center gap-2.5 text-sm shadow-lg shadow-indigo-200">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        Generate Flashcards with AI
      </button>
    </form>

    <!-- Preview -->
    <div id="previewSection" style="display:none" class="mt-10">
      <div class="flex items-center justify-between mb-5">
        <div>
          <h2 class="font-bold text-slate-900 text-lg">Generated Flashcards</h2>
          <p class="text-sm text-indigo-600 font-medium mt-0.5" id="cardCount"></p>
        </div>
        <div class="flex gap-2">
          <button id="viewDeckBtn" class="text-sm font-medium text-slate-700 px-4 py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors">
            View Deck
          </button>
          <button id="studyNowBtn" class="text-sm font-semibold bg-indigo-600 text-white px-4 py-2.5 rounded-xl hover:bg-indigo-700 transition-colors">
            Study Now →
          </button>
        </div>
      </div>
      <div id="previewList" class="space-y-2"></div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/create.js"></script>
</body>
</html>
