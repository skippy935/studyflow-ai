<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — StudyBuild</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav class="sb-nav">
    <div class="sb-nav-inner">
      <div style="display:flex;align-items:center;gap:.75rem;">
        <a href="/dashboard.html" style="color:var(--text-2);display:flex;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg></a>
        <a href="/dashboard.html" class="sb-logo">
          <div class="sb-logo-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
          StudyBuild
        </a>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <span id="quizTitle" style="font-size:.875rem;font-weight:600;color:var(--text-2);"></span>
        <button class="theme-toggle" onclick="toggleTheme()"></button>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
      </div>
    </div>
  </nav>

  <main style="max-width:720px;margin:0 auto;padding:2.5rem 1.5rem;">

    <!-- Loading -->
    <div id="loadingView" style="text-align:center;padding:5rem;">
      <div class="spinner" style="width:36px;height:36px;border-width:3px;margin:0 auto 1rem;"></div>
      <p style="color:var(--text-2);">Loading quiz…</p>
    </div>

    <!-- Quiz view -->
    <div id="quizView" style="display:none;">
      <!-- Progress -->
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;">
        <div class="progress-track" style="flex:1;"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <span id="progressText" style="font-size:.75rem;font-weight:700;color:var(--text-3);white-space:nowrap;"></span>
      </div>

      <div id="questionArea"></div>

      <div style="display:flex;gap:.75rem;margin-top:1.5rem;" id="navBtns">
        <button id="submitBtn" class="btn btn-primary" style="flex:1;justify-content:center;">Check Answer</button>
      </div>
    </div>

    <!-- Results -->
    <div id="resultsView" style="display:none;text-align:center;">
      <div style="width:72px;height:72px;background:var(--primary-dim);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2rem;">🎉</div>
      <h2 style="font-size:1.5rem;font-weight:800;color:var(--text);margin:0 0 .5rem;">Quiz Complete!</h2>
      <p style="color:var(--text-2);margin:0 0 2rem;">Here's how you did:</p>
      <div class="sb-card" style="padding:1.5rem;margin-bottom:1.5rem;display:inline-block;min-width:260px;">
        <div style="font-size:3rem;font-weight:800;color:var(--primary);" id="scoreDisplay">0/0</div>
        <div style="color:var(--text-2);font-size:.875rem;margin-top:.25rem;">Multiple choice score</div>
        <div class="progress-track" style="margin-top:1rem;"><div class="progress-fill" id="scoreFill" style="width:0%"></div></div>
      </div>
      <div id="openAnswerReview" style="text-align:left;margin-bottom:1.5rem;"></div>
      <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;">
        <button onclick="window.location.href='/dashboard.html'" class="btn btn-ghost">Dashboard</button>
        <button onclick="location.reload()" class="btn btn-primary">Retake Quiz</button>
      </div>
    </div>

  </main>

  <script src="/js/api.js"></script>
  <script src="/js/quiz-take.js"></script>
</body>
</html>
