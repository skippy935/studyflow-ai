<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summary — StudyBuild</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav class="sb-nav">
    <div class="sb-nav-inner">
      <div style="display:flex;align-items:center;gap:.75rem;">
        <a href="/dashboard.html" style="color:var(--text-2);display:flex;"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg></a>
        <a href="/dashboard.html" class="sb-logo">
          <div class="sb-logo-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
          StudyBuild
        </a>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <button class="theme-toggle" onclick="toggleTheme()"></button>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
      </div>
    </div>
  </nav>

  <main style="max-width:760px;margin:0 auto;padding:2.5rem 1.5rem;">
    <div id="loadingView" style="text-align:center;padding:5rem;">
      <div class="spinner" style="width:36px;height:36px;border-width:3px;margin:0 auto 1rem;"></div>
    </div>
    <div id="summaryView" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:1rem;flex-wrap:wrap;">
        <div>
          <h1 id="summaryTitle" style="font-size:1.5rem;font-weight:800;color:var(--text);margin:0 0 .25rem;"></h1>
          <span id="summaryTopic" style="font-size:.8rem;color:var(--text-3);"></span>
        </div>
        <button onclick="window.print()" class="btn btn-ghost btn-sm">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
          Print
        </button>
      </div>
      <div class="sb-card" style="padding:2rem;">
        <div class="sb-prose" id="summaryContent"></div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/summary-view.js"></script>
</body>
</html>
