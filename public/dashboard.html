<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — StudyBuild</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

  <nav class="sb-nav">
    <div class="sb-nav-inner">
      <a href="/dashboard.html" class="sb-logo">
        <div class="sb-logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        StudyBuild
      </a>
      <div style="display:flex;align-items:center;gap:.75rem;">
        <span style="font-size:.8rem;color:var(--text-2)">Hi, <span id="userName" style="color:var(--text);font-weight:600"></span></span>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
      </div>
    </div>
  </nav>

  <main style="max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem;">

    <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.75rem;flex-wrap:wrap;">
      <div>
        <h1 style="font-size:1.5rem;font-weight:800;color:var(--text);margin:0">Dashboard</h1>
        <p style="color:var(--text-2);font-size:.875rem;margin:.25rem 0 0">All your study content in one place</p>
      </div>
      <a href="/create.html" class="btn btn-primary">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Create New
      </a>
    </div>

    <!-- Tabs -->
    <div class="sb-tabs" style="margin-bottom:1.75rem;">
      <button class="sb-tab active" data-tab="decks">⚡ Flashcard Decks</button>
      <button class="sb-tab" data-tab="quizzes">❓ Quizzes</button>
      <button class="sb-tab" data-tab="summaries">📝 Summaries</button>
    </div>

    <!-- Decks tab -->
    <div id="tab-decks">
      <div id="decksLoading" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;">
        <div style="background:var(--surface);border-radius:var(--radius);height:160px;border:1px solid var(--border);animation:pulse 1.5s infinite;"></div>
        <div style="background:var(--surface);border-radius:var(--radius);height:160px;border:1px solid var(--border);animation:pulse 1.5s infinite;"></div>
        <div style="background:var(--surface);border-radius:var(--radius);height:160px;border:1px solid var(--border);animation:pulse 1.5s infinite;"></div>
      </div>
      <div id="decksEmpty" style="display:none;text-align:center;padding:5rem 1rem;">
        <div style="width:64px;height:64px;background:var(--primary-dim);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;">
          <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="var(--primary)" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        </div>
        <p style="color:var(--text-2);margin-bottom:1rem;">No flashcard decks yet.</p>
        <a href="/create.html" class="btn btn-primary btn-sm">Create your first deck</a>
      </div>
      <div id="decksGrid" style="display:none;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;"></div>
    </div>

    <!-- Quizzes tab -->
    <div id="tab-quizzes" style="display:none;">
      <div id="quizzesLoading" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;">
        <div style="background:var(--surface);border-radius:var(--radius);height:140px;border:1px solid var(--border);animation:pulse 1.5s infinite;"></div>
        <div style="background:var(--surface);border-radius:var(--radius);height:140px;border:1px solid var(--border);animation:pulse 1.5s infinite;"></div>
      </div>
      <div id="quizzesEmpty" style="display:none;text-align:center;padding:5rem 1rem;">
        <p style="color:var(--text-2);margin-bottom:1rem;">No quizzes yet.</p>
        <a href="/create.html?mode=quiz" class="btn btn-primary btn-sm">Create your first quiz</a>
      </div>
      <div id="quizzesGrid" style="display:none;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;"></div>
    </div>

    <!-- Summaries tab -->
    <div id="tab-summaries" style="display:none;">
      <div id="summariesLoading" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;">
        <div style="background:var(--surface);border-radius:var(--radius);height:140px;border:1px solid var(--border);animation:pulse 1.5s infinite;"></div>
        <div style="background:var(--surface);border-radius:var(--radius);height:140px;border:1px solid var(--border);animation:pulse 1.5s infinite;"></div>
      </div>
      <div id="summariesEmpty" style="display:none;text-align:center;padding:5rem 1rem;">
        <p style="color:var(--text-2);margin-bottom:1rem;">No summaries yet.</p>
        <a href="/create.html?mode=summary" class="btn btn-primary btn-sm">Create your first summary</a>
      </div>
      <div id="summariesGrid" style="display:none;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;"></div>
    </div>

  </main>

  <style>
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
